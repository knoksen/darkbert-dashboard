name: Audit Fix

on:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm ci

      - name: Run npm audit fix
        run: |
          npm audit fix || true
          npm audit fix --force || true

      - name: Commit and create PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): automated npm audit fix'
          branch: 'chore/automated-audit-fix'
          title: 'chore(deps): automated npm audit fix'
          body: 'Automated dependency fixes generated by `npm audit fix`.'
